<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Lead Demo Index</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #171923;
      background: #f6f7f9;
    }
    main {
      width: min(1120px, calc(100% - 36px));
      margin: 0 auto;
      padding: 56px 0;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(32px, 5vw, 56px);
      letter-spacing: 0;
    }
    p {
      color: #606776;
      margin: 0 0 28px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
    }
    th,
    td {
      padding: 13px 14px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }
    th {
      color: #4b5563;
      background: #f9fafb;
      font-size: 12px;
      text-transform: uppercase;
    }
    tr:last-child td { border-bottom: 0; }
    a {
      color: #0f766e;
      font-weight: 760;
    }
  </style>
</head>
<body>
  <main>
    <h1>Lead Demo Index</h1>
    <p>Bu sayfa noindex olarak üretilir. Müşteriye gönderilecek linkler aşağıdadır.</p>
    <table>
      <thead>
        <tr>
          <th>İşletme</th>
          <th>Kategori</th>
          <th>Durum</th>
          <th>Demo</th>
        </tr>
      </thead>
      <tbody>
        {{rows}}
      </tbody>
    </table>
  </main>
</body>
</html>
